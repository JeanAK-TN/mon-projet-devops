name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend lint, tests, coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: src/backend/package-lock.json

      - name: Install dependencies
        run: npm ci || npm install

      - name: Lint
        run: npm run lint --if-present

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test with coverage
        run: npm run test:coverage

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: src/backend/coverage/

      - name: npm audit (high severity)
        run: npm audit --audit-level=high || true

  frontend:
    name: Frontend lint and build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci || npm install

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: src/frontend/dist/

  docker:
    name: Build Docker images & Trivy scan
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: src/backend
          push: false
          load: true
          tags: ecommerce-backend:ci

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: src/frontend
          push: false
          load: true
          tags: ecommerce-frontend:ci

      - name: Trivy scan (backend)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ecommerce-backend:ci
          format: table
          severity: CRITICAL,HIGH
          exit-code: '0'

      - name: Trivy scan (frontend)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ecommerce-frontend:ci
          format: table
          severity: CRITICAL,HIGH
          exit-code: '0'

  terraform:
    name: Terraform validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infrastructure/terraform
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0
      - run: terraform fmt -check -recursive
      - run: terraform init -backend=false
      - run: terraform validate
