server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # 127.0.0.11 = Docker internal DNS (compose) ; 169.254.169.253 = AWS VPC DNS (ECS).
  # Combined with a variable in proxy_pass below, this defers DNS lookup to request time
  # so nginx starts even when "backend" doesn't resolve (in ECS the ALB routes /api/* directly).
  resolver 127.0.0.11 169.254.169.253 valid=30s ipv6=off;

  location / {
    try_files $uri $uri/ /index.html;
  }

  location /api/ {
    set $upstream_backend "backend:3000";
    proxy_pass http://$upstream_backend;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }
}
